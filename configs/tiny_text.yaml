seed: 42

tokenizer:
  type: char

model:
  hidden_size: 128
  num_hidden_layers: 4
  num_attention_heads: 4
  intermediate_size: 512
  max_position_embeddings: 256
  hidden_dropout: 0.1
  attention_dropout: 0.1

data:
  train_file: data/sample.txt
  val_file: null
  batch_size: 32
  max_length: 128
  num_workers: 2

optimizer:
  learning_rate: 3.0e-4
  weight_decay: 0.01

scheduler:
  warmup_steps: 100
  total_steps: 2000

trainer:
  max_steps: 2000
  precision: bf16-mixed
  accelerator: auto
  devices: 1
  strategy: auto
  accumulate_grad_batches: 1
  gradient_clip_val: 1.0
  log_every_n_steps: 10
  ckpt_dir: checkpoints/tiny_text
