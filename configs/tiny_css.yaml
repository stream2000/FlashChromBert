seed: 42

tokenizer:
  type: cstate
  num_states: 15

data:
  kind: random_fixed
  num_samples: 4096
  seq_len: 256
  batch_size: 32
  num_workers: 2

model:
  hidden_size: 256
  num_hidden_layers: 4
  num_attention_heads: 8
  intermediate_size: 1024
  max_position_embeddings: 512
  hidden_dropout: 0.1
  attention_dropout: 0.1

optimizer:
  learning_rate: 3.0e-4
  weight_decay: 0.01

scheduler:
  warmup_steps: 50
  total_steps: 500

trainer:
  max_steps: 200
  precision: bf16-mixed
  accelerator: auto
  devices: 1
  strategy: auto
  accumulate_grad_batches: 1
  gradient_clip_val: 1.0
  log_every_n_steps: 10
  ckpt_dir: checkpoints/tiny_css
