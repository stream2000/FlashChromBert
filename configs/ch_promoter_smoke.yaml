seed: 42

tokenizer:
  type: kmer_cstate
  k: 4
  num_states: 15

masking:
  type: kmer_mask_list
  k: 4
  mlm_probability: 0.15

data:
  kind: file
  train_file: data/ch_temp/promoter_pretrain_data/pretrain_4mer_all.txt
  batch_size: 32
  max_length: 256
  num_workers: 4

model:
  hidden_size: 384
  num_hidden_layers: 6
  num_attention_heads: 12
  intermediate_size: 1536
  max_position_embeddings: 512
  hidden_dropout: 0.1
  attention_dropout: 0.1

optimizer:
  learning_rate: 5.0e-5
  weight_decay: 0.01

scheduler:
  warmup_steps: 20
  total_steps: 200

trainer:
  max_steps: 100
  precision: bf16-mixed
  accelerator: auto
  devices: 1
  strategy: auto
  accumulate_grad_batches: 1
  gradient_clip_val: 1.0
  log_every_n_steps: 10
  ckpt_dir: checkpoints/ch_promoter_smoke
