seed: 42

tokenizer:
  type: kmer_cstate
  k: 4
  num_states: 15

masking:
  type: kmer_mask_list
  k: 4
  mlm_probability: 0.025

data:
  kind: file
  train_file: data/ch_temp/promoter_pretrain_data/pretrain_4mer_all.txt
  val_file: null
  batch_size: 10
  max_length: 512
  num_workers: 4

model:
  hidden_size: 384
  num_hidden_layers: 12
  num_attention_heads: 12
  intermediate_size: 1536
  max_position_embeddings: 512
  hidden_dropout: 0.1
  attention_dropout: 0.1

optimizer:
  learning_rate: 2.0e-4
  weight_decay: 0.01

scheduler:
  warmup_steps: 1000
  total_steps: 10000

trainer:
  max_steps: 10000
  precision: bf16-mixed
  accelerator: gpu
  devices: 4
  strategy: ddp
  accumulate_grad_batches: 5
  gradient_clip_val: 1.0
  log_every_n_steps: 25
  ckpt_dir: checkpoints/ch_promoter_full_ddp
