seed: 42

# IHEC 18-state Promoter classification (using whole-genome pretrained checkpoint)
task: classification

tokenizer:
  type: kmer_cstate
  k: 4
  num_states: 18

pretrained_ckpt: checkpoints/ch_ihec_whole_genome_tuned/step=38000-train_loss=0.152.ckpt
classifier_dropout: 0.1

data:
  train_file: /work/Users/lee/ch_temp_IHEC/promoter_IHEC18_finetune_data/train.tsv
  val_file: /work/Users/lee/ch_temp_IHEC/promoter_IHEC18_finetune_data/dev.tsv
  has_header: true
  batch_size: 128
  max_length: 512
  num_workers: 8

model:
  hidden_size: 384
  num_hidden_layers: 12
  num_attention_heads: 12
  intermediate_size: 1536
  max_position_embeddings: 512
  hidden_dropout: 0.1
  attention_dropout: 0.1

optimizer:
  learning_rate: 2.0e-5
  weight_decay: 0.01

scheduler:
  warmup_ratio: 0.1

trainer:
  max_epochs: 6
  precision: bf16-mixed
  accelerator: gpu
  devices: [0]
  strategy: auto
  accumulate_grad_batches: 1
  gradient_clip_val: 1.0
  log_every_n_steps: 25
  val_check_interval: 1.0
  monitor: val_auc
  monitor_mode: max
  ckpt_dir: checkpoints/ft_ihec18_promoter_cls
  log_name: ft_ihec18_promoter_cls
  report_file: docs/runs/2026-04-23_ft_ihec18_promoter_cls.json
