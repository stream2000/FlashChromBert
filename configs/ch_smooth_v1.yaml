seed: 42

tokenizer:
  type: kmer_cstate
  k: 4
  num_states: 15

masking:
  type: kmer_mask_list
  k: 4
  mlm_probability: 0.0375

data:
  kind: file
  train_file: data/ch_temp/promoter_pretrain_data/train_split.txt
  val_file: data/ch_temp/promoter_pretrain_data/val_split.txt
  batch_size: 256         # 🚀 极致放大单卡 Batch
  max_length: 512
  num_workers: 16         # 🚀 高效 I/O

model:
  hidden_size: 384        # 🌟 保持黄金参数量
  num_hidden_layers: 12
  num_attention_heads: 12
  intermediate_size: 1536
  max_position_embeddings: 512
  hidden_dropout: 0.1
  attention_dropout: 0.1

optimizer:
  learning_rate: 4.0e-4   # 🌟 匹配大 Batch 的学习率
  weight_decay: 0.01

scheduler:
  warmup_steps: 500
  total_steps: 5000

trainer:
  max_steps: 5000         # 🌟 控制在 ~2 个 Epoch，防过拟合
  precision: bf16-mixed
  accelerator: gpu
  devices: 4
  strategy: ddp
  accumulate_grad_batches: 1 # 🚀 零累加，纯物理并发
  gradient_clip_val: 1.0
  log_every_n_steps: 25
  ckpt_dir: checkpoints/ch_smooth_v1
